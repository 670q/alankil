<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عقارات حديثة | مستعرض العقارات ثلاثي الأبعاد</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css?v=2">
    
    <!-- Use Google's model-viewer library -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">إيستيت<span>3D</span></div>
        <ul class="nav-links">
            <li><a href="#">العقارات</a></li>
            <li><a href="#">من نحن</a></li>
            <li><a href="#">اتصل بنا</a></li>
        </ul>
        <button class="nav-btn">ابدأ الآن</button>
    </nav>

    <main class="hero">
        <div class="hero-content">
            <div class="location-badge">الرياض، حي النخيل</div>
            <h1 class="hero-title">فيلا النخيل العصرية</h1>
            <p class="hero-subtitle">استكشف فيلا أحلامك في قلب الرياض. تصميم عصري فاخر يجمع بين الفخامة والراحة مع إمكانية التجول الافتراضي بالداخل.</p>
            <div class="hero-actions">
                <button class="btn btn-primary" id="toggle-view">دخول البيت (3D)</button>
                <button class="btn btn-outline">احجز موعداً للمعاينة</button>
            </div>
            
            <div class="property-details">
                <div class="detail-item">
                    <span class="detail-label">السعر</span>
                    <span class="detail-value">3.5M ريال</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">الأدوار</span>
                    <span class="detail-value">3</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">الغرف</span>
                    <span class="detail-value">5</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">المساحة</span>
                    <span class="detail-value">450 م²</span>
                </div>
            </div>
        </div>

        <div class="hero-model-container">
            <!-- 3D Model Viewer -->
            <model-viewer 
                id="main-viewer"
                src="public/3_12_2026.glb" 
                alt="نموذج ثلاثي الأبعاد لعقار حديث"
                camera-controls 
                auto-rotate 
                ar 
                shadow-intensity="1.5" 
                exposure="1"
                environment-image="neutral"
                camera-orbit="45deg 75deg 15m"
                class="property-model">
                
                <div class="progress-bar hide" slot="progress-bar">
                    <div class="update-bar"></div>
                </div>
                <!-- Custom AR Button -->
                <button slot="ar-button" class="ar-btn">
                    عرض في مساحتك (AR)
                </button>
            </model-viewer>
        </div>
    </main>

    <script>
        const viewer = document.querySelector('#main-viewer');
        const toggleBtn = document.querySelector('#toggle-view');
        let isInterior = false;

        toggleBtn.addEventListener('click', () => {
            isInterior = !isInterior;
            if (isInterior) {
                // Look inside
                viewer.cameraOrbit = "0deg 90deg 1m";
                viewer.cameraTarget = "0.5m 1.2m 0.5m";
                viewer.fieldOfView = "60deg";
                viewer.autoRotate = false;
                toggleBtn.textContent = 'الخروج للمنظور الخارجي';
            } else {
                // Look outside
                viewer.cameraOrbit = "45deg 75deg 15m";
                viewer.cameraTarget = "auto auto auto";
                viewer.fieldOfView = "auto";
                viewer.autoRotate = true;
                toggleBtn.textContent = 'دخول البيت (3D)';
            }
        });
    </script>
</body>
</html>
